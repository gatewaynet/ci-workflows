name: 'ArgoCD Restart Deployment'
description: 'Sync and/or restart ArgoCD-managed deployment(s) after a new image is pushed'

inputs:
  app-name:
    description: 'ArgoCD application name'
    required: true
  resource-name:
    description: 'Kubernetes deployment name(s) - comma-separated for multiple, or "all" to restart all deployments'
    required: true
  argocd-server:
    description: 'ArgoCD server hostname (e.g. argocd.example.com)'
    required: true
  argocd-auth-token:
    description: 'ArgoCD authentication token'
    required: true
  kind:
    description: 'Kubernetes resource kind'
    required: false
    default: 'Deployment'
  sync-force:
    description: 'Run argocd app sync --force before restart (triggers pre-sync hooks like migrations)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install ArgoCD CLI
      shell: bash
      run: |
        curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x /usr/local/bin/argocd

    - name: Sync (force)
      if: inputs.sync-force == 'true'
      shell: bash
      run: |
        APP="${{ inputs.app-name }}"
        ARGOCD_OPTS="--server ${{ inputs.argocd-server }} --auth-token ${{ inputs.argocd-auth-token }} --grpc-web --insecure"

        echo "Syncing ${APP} with --force..."
        argocd app sync "${APP}" --force ${ARGOCD_OPTS}

        echo "### ArgoCD Sync — ${APP}" >> $GITHUB_STEP_SUMMARY
        echo "Forced sync triggered (pre-sync hooks will run)" >> $GITHUB_STEP_SUMMARY

    - name: Restart Deployment(s)
      shell: bash
      run: |
        APP="${{ inputs.app-name }}"
        SERVER="${{ inputs.argocd-server }}"
        TOKEN="${{ inputs.argocd-auth-token }}"
        KIND="${{ inputs.kind }}"
        RESOURCE_INPUT="${{ inputs.resource-name }}"

        ARGOCD_OPTS="--server ${SERVER} --auth-token ${TOKEN} --grpc-web --insecure"

        if [ "${RESOURCE_INPUT}" = "all" ]; then
          RESOURCES=$(argocd app resources "${APP}" ${ARGOCD_OPTS} \
            | awk -v kind="${KIND}" '$2 == kind {print $3}')
        else
          RESOURCES=$(echo "${RESOURCE_INPUT}" | tr ',' '\n' | sed 's/^ *//;s/ *$//')
        fi

        if [ -z "${RESOURCES}" ]; then
          echo "No ${KIND} resources found in ${APP}"
          echo "### ArgoCD Restart — No resources found" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        RESTARTED=""
        FAILED=""

        for RESOURCE in ${RESOURCES}; do
          echo "Restarting ${KIND} ${RESOURCE} in ${APP}..."
          if argocd app actions run "${APP}" restart \
            --kind "${KIND}" \
            --resource-name "${RESOURCE}" \
            ${ARGOCD_OPTS} 2>&1; then
            RESTARTED="${RESTARTED}\n- \`${RESOURCE}\`"
          else
            echo "Failed to restart ${RESOURCE}"
            FAILED="${FAILED}\n- \`${RESOURCE}\`"
          fi
        done

        echo "### ArgoCD Restart — ${APP}" >> $GITHUB_STEP_SUMMARY
        if [ -n "${RESTARTED}" ]; then
          echo -e "Restarted:${RESTARTED}" >> $GITHUB_STEP_SUMMARY
        fi
        if [ -n "${FAILED}" ]; then
          echo -e "Failed:${FAILED}" >> $GITHUB_STEP_SUMMARY
        fi
