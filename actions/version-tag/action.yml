name: 'Version Tag'
description: 'Generate and optionally push auto-incrementing version tags (dev-vX.Y.Z, vX.Y.Z, pr-N)'

inputs:
  environment:
    description: 'Target environment: develop, production, or preview'
    required: true
  pr-number:
    description: 'PR number (required when environment=preview)'
    required: false
    default: ''
  tag-prefix:
    description: 'Tag prefix for monorepo per-service tags (e.g. game-engine-auth)'
    required: false
    default: ''
  push-tag:
    description: 'Push the git tag to origin (set to false to only generate the tag name)'
    required: false
    default: 'true'

outputs:
  tag:
    description: 'The generated version tag'
    value: ${{ steps.generate.outputs.tag }}

runs:
  using: 'composite'
  steps:
    - name: Generate version tag
      id: generate
      shell: bash
      run: |
        PREFIX="${{ inputs.tag-prefix }}"
        PREFIX_SLASH=""
        if [ -n "$PREFIX" ]; then
          PREFIX_SLASH="${PREFIX}/"
        fi

        case "${{ inputs.environment }}" in
          preview)
            TAG="pr-${{ inputs.pr-number }}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Preview tag: ${TAG}"
            ;;

          develop)
            LATEST_TAG=$(git tag -l "${PREFIX_SLASH}dev-v*.*.*" | sort -V | tail -n1)

            if [ -z "$LATEST_TAG" ]; then
              NEW_TAG="${PREFIX_SLASH}dev-v1.0.0"
            else
              VERSION_PART="${LATEST_TAG#${PREFIX_SLASH}dev-v}"
              MAJOR=$(echo "$VERSION_PART" | cut -d. -f1)
              MINOR=$(echo "$VERSION_PART" | cut -d. -f2)
              PATCH=$(echo "$VERSION_PART" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              NEW_TAG="${PREFIX_SLASH}dev-v${MAJOR}.${MINOR}.${PATCH}"
            fi

            echo "Previous tag: $LATEST_TAG"
            echo "New tag: $NEW_TAG"

            if [ "${{ inputs.push-tag }}" = "true" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag -a "$NEW_TAG" -m "Auto-generated dev tag"
              git push origin "$NEW_TAG"
            fi

            echo "tag=${NEW_TAG#${PREFIX_SLASH}}" >> "$GITHUB_OUTPUT"
            ;;

          production)
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "Commit message: $COMMIT_MSG"

            # Try: release/vX.Y.Z, Release vX.Y.Z, or vX.Y.Z
            VERSION=$(echo "$COMMIT_MSG" | grep -oP '(release/v|Release v|^v)\K[0-9]+\.[0-9]+\.[0-9]+' | head -1)

            if [ -z "$VERSION" ]; then
              if [ -f "package.json" ]; then
                VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
              fi
            fi

            if [ -z "$VERSION" ]; then
              echo "Could not extract version from commit message or package.json"
              exit 1
            fi

            VERSION_TAG="${PREFIX_SLASH}v${VERSION}"
            echo "Production release version: $VERSION_TAG"

            if [ "${{ inputs.push-tag }}" = "true" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
                echo "Tag $VERSION_TAG already exists, reusing it"
              else
                git tag -a "$VERSION_TAG" -m "Production release $VERSION_TAG"
                git push origin "$VERSION_TAG"
                echo "Created production tag: $VERSION_TAG"
              fi
            fi

            echo "tag=${VERSION_TAG#${PREFIX_SLASH}}" >> "$GITHUB_OUTPUT"
            ;;

          *)
            echo "Unknown environment: ${{ inputs.environment }}"
            exit 1
            ;;
        esac
